name: Build pkdx binaries

on:
  push:
    tags: ['v*']
  # Pre-merge validation path: maintainers can dispatch manually on a branch
  # to exercise the Windows MSYS2/OpenBLAS toolchain before tagging a release.
  # The release job is gated to tag pushes so manual runs only build & test.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
            binary: pkdx-darwin-arm64
          - os: ubuntu-22.04
            target: linux-x86_64
            binary: pkdx-linux-x86_64
          - os: windows-2022
            target: windows-x86_64
            binary: pkdx-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          echo "$env:USERPROFILE\.moon\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Install BLAS (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev liblapack-dev

      - name: Install BLAS (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Use MSYS2's MinGW64 packages so OpenBLAS and gcc share the same ABI
          # without spending release CI time building OpenBLAS from source.

          # The default mirrorlist on the GitHub Actions Windows image rotates
          # through mirrors including tuna, which has timed out at ~0 B/sec
          # from Azure runners and aborted the release job mid-database-sync.
          # Pin to upstream + geographically diverse fallbacks (skipping tuna)
          # to make this step deterministic.
          Set-Content -Path C:\msys64\etc\pacman.d\mirrorlist.msys -Encoding ASCII -Value @'
          Server = https://repo.msys2.org/msys/$arch/
          Server = https://downloads.sourceforge.net/project/msys2/REPOS/MSYS2/$arch/
          Server = https://mirror.yandex.ru/mirrors/msys2/msys/$arch/
          '@
          Set-Content -Path C:\msys64\etc\pacman.d\mirrorlist.mingw64 -Encoding ASCII -Value @'
          Server = https://repo.msys2.org/mingw/$repo/
          Server = https://downloads.sourceforge.net/project/msys2/REPOS/MINGW/$arch/
          Server = https://mirror.yandex.ru/mirrors/msys2/mingw/$repo/
          '@

          # Belt-and-braces: even with curated mirrors, a transient blip during
          # the multi-file sync can still abort pacman. Retry the whole call
          # before failing the job.
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            C:\msys64\usr\bin\pacman.exe -Sy --noconfirm --needed mingw-w64-x86_64-gcc mingw-w64-x86_64-openblas
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq $maxAttempts) {
              Write-Error "pacman failed after $maxAttempts attempts"
              exit 1
            }
            Write-Host "pacman attempt $attempt failed (exit $LASTEXITCODE); retrying in 10s..."
            Start-Sleep -Seconds 10
          }

          # Add OpenBLAS DLL dir to PATH for runtime resolution during moon test.
          Add-Content $env:GITHUB_PATH "C:\msys64\mingw64\bin"

      - name: Configure MoonBit compiler (Windows)
        # MoonBit's native backend reads MOON_CC for compiler override (NOT the
        # conventional CC); without it, auto-detection picks cl.exe (MSVC) on
        # Windows, which would reject the GCC-style `-L/-l` link flags below.
        # Use the same MSYS2 MinGW64 gcc that provides the OpenBLAS import
        # library above. Pin the absolute path so resolution does not depend on
        # PATH state.
        # Setting MOON_CC must be Windows-only: MoonBit treats any present
        # MOON_CC as an explicit override and parses the value, so an empty
        # string trips `failed to parse cc from env MOON_CC` on Linux/macOS.
        # Writing to $GITHUB_ENV from a runner.os == 'Windows' step keeps the
        # variable absent on the other matrix legs.
        if: runner.os == 'Windows'
        shell: bash
        run: echo "MOON_CC=C:/msys64/mingw64/bin/gcc.exe" >> "$GITHUB_ENV"

      - name: Build
        run: |
          moon update
          bash scripts/configure_native_link_flags.sh
          moon build --target native src/main
        shell: bash

      - name: Test
        run: |
          bash scripts/configure_native_link_flags.sh
          moon test --target native
        shell: bash

      - name: Copy binary (Unix)
        if: runner.os != 'Windows'
        run: cp _build/native/debug/build/src/main/main.exe ${{ matrix.binary }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "_build\native\debug\build\src\main\main.exe" "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    # Only publish a release on tag pushes. Gate on event_name as well so a
    # manual workflow_dispatch on a tag ref (e.g. re-running an old release)
    # does not silently re-publish.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "pkdx ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/pkdx-darwin-arm64/pkdx-darwin-arm64 \
            artifacts/pkdx-linux-x86_64/pkdx-linux-x86_64 \
            artifacts/pkdx-windows-x86_64.exe/pkdx-windows-x86_64.exe
